<!-- Tab: Mapa Táctico -->
<div class="tactical-map-container" style="width: 100%; position: relative;">
    <div id="leaflet-tactical-map" style="width: 100%; height: calc(100vh - 160px);"></div>
</div>

<script>
(function() {
    function initTacticalMap() {
        const container = document.getElementById('leaflet-tactical-map');
        if (!container || container._leaflet_id) return;

        // Centered over Chile / South America matching reference image 125900
        const map = L.map('leaflet-tactical-map', {
            center: [-33.4489, -70.6693], // Santiago, Chile
            zoom: 5,
            zoomControl: true
        });

        // CartoDB Dark Matter tiles for Cyberpunk Tactical look
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // Tactical Node Markers from DB
        const nodes = [
            {% for node in nodes %}
            {% if node.latitude and node.longitude %}
            { 
                name: "{{ node.label|escapejs }}", 
                lat: {{ node.latitude|stringformat:"f" }}, 
                lng: {{ node.longitude|stringformat:"f" }}, 
                status: "{{ node.status }}", 
                ip: "{{ node.host|escapejs }}" 
            }{% if not forloop.last %},{% endif %}
            {% endif %}
            {% endfor %}
        ];

        nodes.forEach(node => {
            const color = node.status === 'online' ? '#00e676' : (node.status === 'unstable' ? '#ffb300' : '#ff1744');
            const marker = L.circleMarker([node.lat, node.lng], {
                radius: 8,
                fillColor: color,
                color: '#ffffff',
                weight: 1.5,
                opacity: 1,
                fillOpacity: 0.9
            }).addTo(map);

            marker.bindPopup(`
                <div style="font-family: Rajdhani, sans-serif; color: #000;">
                    <strong>${node.name}</strong><br/>
                    IP: ${node.ip}<br/>
                    Estado: <span style="color:${color}; font-weight:bold;">${node.status.toUpperCase()}</span>
                </div>
            `);
        });

        setTimeout(() => map.invalidateSize(), 300);
    }

    if (window.L) {
        initTacticalMap();
    } else {
        window.addEventListener('load', initTacticalMap);
    }
})();
</script>
