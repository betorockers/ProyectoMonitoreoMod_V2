name: Build and Release OTA
on:
  push:
    tags:
      - 'v*.*.*'
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install
        run: pip install -r requirements.txt nuitka
      - name: Compile
        run: powershell ./build_v4.ps1
